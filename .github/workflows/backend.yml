name: Backend CI

on: [pull_request]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install flake8

      - name: Run flake8
        run: flake8 backend/ --max-line-length=120 --exclude=backend/venv

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install physics_engine dependencies
        run: pip install -r physics_engine/requirements.txt

      - name: Run physics_engine tests
        run: pytest physics_engine/tests/ -v

      - name: Run backend tests
        run: |
          cd backend
          PYTHONPATH=$GITHUB_WORKSPACE pytest tests/ -v
        continue-on-error: true  # remove this once you have backend tests